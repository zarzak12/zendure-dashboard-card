name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  assets:
    name: Attach card to release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/zendure-dashboard-card.js
